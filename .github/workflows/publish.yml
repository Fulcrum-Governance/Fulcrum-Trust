name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate tag matches pyproject version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          project_version = tomllib.loads(pyproject.read_text())["project"]["version"]

          tag_name = os.environ.get("GITHUB_REF_NAME", "")
          normalized_tag = tag_name[1:] if tag_name.startswith("v") else tag_name

          if normalized_tag != project_version:
              print(
                  f"Tag/version mismatch: tag='{tag_name}' vs pyproject='{project_version}'. "
                  "Update pyproject.toml or retag before publishing.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Tag/version check passed: {tag_name} -> {project_version}")
          PY

      - name: Install build
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/fulcrum-trust
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fulcrum-trust
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
